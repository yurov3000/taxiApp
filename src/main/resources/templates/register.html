<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Регистрация</title><link rel="stylesheet" th:href="@{/style.css}"></head>
<body>
<header><h1>Регистрация</h1></header>
<section>
    <form action="/register" method="post">
        <select name="role" required><option value="PASSENGER">Пассажир</option><option value="DRIVER">Водитель</option></select>
        <input type="text" name="name" placeholder="Имя" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="phone" placeholder="Телефон" required>
        <input type="password" name="password" placeholder="Пароль" required>
        <input type="text" name="license" placeholder="Номер прав (для водителей)">
        <button type="submit">Зарегистрироваться</button>
    </form>
    <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
</section>
</body>
</html>
